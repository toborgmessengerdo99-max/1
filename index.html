const KEY='airport_quiz_full_v2';
let state=JSON.parse(localStorage.getItem(KEY)||'{}');
state=Object.assign({page:'home',mode:'顺序练习',filter:'全部',index:0,answered:{},wrong:{},fav:{},exam:null,dark:false},state);
if(state.dark)document.body.classList.add('dark');
const save=()=>localStorage.setItem(KEY,JSON.stringify(state));
const $=s=>document.querySelector(s); const view=$('#view');
const filters=['全部','单选题','多选题','判断题'];
function byFilter(){let arr=QUESTIONS; if(state.filter!=='全部')arr=arr.filter(q=>q.section===state.filter); return arr;}
function answeredCount(){return Object.keys(state.answered).length}
function pct(){return Math.round(answeredCount()/QUESTIONS.length*100)}
function renderTabs(){$('#tabs').innerHTML=filters.map(f=>`<button class="tab ${state.filter===f?'active':''}" onclick="state.filter='${f}';state.index=0;save();render()">${f}</button>`).join('')}
function setPage(p){state.page=p;save();render()}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>setPage(b.dataset.page));
$('#darkBtn').onclick=()=>{state.dark=!state.dark;document.body.classList.toggle('dark',state.dark);save();};
function syncNav(){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===state.page))}
function home(){let done=answeredCount(), wrong=Object.keys(state.wrong).length, fav=Object.keys(state.fav).length; view.innerHTML=`
<div class="card"><div class="row"><div><div class="muted">当前进度</div><div class="big">${done} / 300</div></div><button class="btn" onclick="state.page='practice';save();render()">继续刷题</button></div><div class="statbar" style="margin-top:12px"><i style="width:${pct()}%"></i></div><div class="muted" style="margin-top:8px">已完成 ${pct()}%</div></div>
<div class="grid"><div class="card"><div class="big">${wrong}</div><div class="muted">错题</div></div><div class="card"><div class="big">${fav}</div><div class="muted">收藏</div></div></div>
<div class="card"><h3>开始练习</h3><div class="grid"><button class="btn" onclick="startPractice('顺序练习')">顺序练习</button><button class="btn secondary" onclick="startPractice('随机练习')">随机练习</button><button class="btn secondary" onclick="state.page='wrong';save();render()">只刷错题</button><button class="btn secondary" onclick="startExam()">模拟考试</button></div><p class="notice">做错会自动进入错题本；收藏、错题、进度都保存在这个浏览器里。换手机/清缓存会丢失。</p></div>
<div class="card"><h3>章节</h3>${filters.slice(1).map(f=>`<button class="option" onclick="state.filter='${f}';state.page='practice';state.index=0;save();render()">${f} <span class="muted">${QUESTIONS.filter(q=>q.section===f).length}题</span></button>`).join('')}</div>
<div class="card"><button class="btn ghost" onclick="resetAll()">清空做题记录</button></div>`}
function startPractice(m){state.mode=m;state.page='practice'; if(m==='随机练习')state.order=shuffle(byFilter().map(q=>q.id)); state.index=0; save();render()}
function getPracticeList(){let arr=byFilter(); if(state.mode==='随机练习'){let map=new Map(QUESTIONS.map(q=>[q.id,q])); return (state.order||[]).map(id=>map.get(id)).filter(Boolean)} return arr;}
function practice(listOverride,titleOverride){let arr=listOverride||getPracticeList(); if(!arr.length){view.innerHTML='<div class="card">这里还没有题哦。</div>';return} if(state.index>=arr.length)state.index=0; let q=arr[state.index]; renderQuestion(q, arr.length, titleOverride||state.mode, false);}
function wrong(){let ids=Object.keys(state.wrong).map(Number); let arr=QUESTIONS.filter(q=>ids.includes(q.id)); practice(arr,'错题本')}
function fav(){let ids=Object.keys(state.fav).map(Number); let arr=QUESTIONS.filter(q=>ids.includes(q.id)); practice(arr,'收藏题')}
function examPage(){if(!state.exam){view.innerHTML=`<div class="card"><h3>模拟考试</h3><p class="notice">随机抽100题；做完可看分数和错题。</p><button class="btn" onclick="startExam()">开始模拟考试</button></div>`;return} let arr=state.exam.ids.map(id=>QUESTIONS.find(q=>q.id===id)).filter(Boolean); if(state.exam.done) return examResult(arr); let q=arr[state.exam.index]; renderQuestion(q, arr.length, '模拟考试', true)}
function startExam(){let ids=shuffle(QUESTIONS.map(q=>q.id)).slice(0,100); state.exam={ids,index:0,answers:{},done:false};state.page='exam';save();render()}
function renderQuestion(q,total,title,isExam){let selected=isExam?state.exam.answers[q.id]:(state.answered[q.id]?.selected||[]); let submitted=isExam?!!state.exam.answers[q.id]:!!state.answered[q.id]; let isMulti=q.section==='多选题'; let opts=Object.entries(q.options); view.innerHTML=`
<div class="card"><div class="row"><div><div class="muted">${title} · ${state.index+1}/${total}</div><div class="qmeta"><span class="tag">第${q.id}题</span><span class="tag">${q.section}</span>${isMulti?'<span class="tag">多选</span>':''}</div></div><button class="star" onclick="toggleFav(${q.id})">${state.fav[q.id]?'★':'☆'}</button></div><div class="stem">${escapeHtml(q.stem)}</div><div id="opts">${opts.map(([k,v])=>optionHtml(q,k,v,selected,submitted,isExam)).join('')}</div><div class="answerbox ${submitted&&!isExam?'show':''}" id="ans"><b>正确答案：${q.answer}</b>${q.note?`<div class="notice">${escapeHtml(q.note)}</div>`:''}</div></div>
<div class="grid"><button class="btn ghost" onclick="prevQ()">上一题</button><button class="btn" onclick="${submitted?'nextQ()':'submitQ()'}">${submitted?'下一题':'提交答案'}</button></div>
<div class="card"><div class="row"><button class="btn secondary" onclick="showAnswer(${q.id})">看答案</button><button class="btn ghost" onclick="nextQ()">跳过</button></div></div>`; window.currentQ=q; window.currentIsExam=isExam;}
function optionHtml(q,k,v,sel,submitted,isExam){let chosen=(sel||[]).includes(k); let cls='option'+(chosen?' selected':''); if(submitted&&!isExam){let correct=q.answer.includes(k); if(correct)cls+=' correct'; if(chosen&&!correct)cls+=' wrong';} return `<button class="${cls}" onclick="choose('${k}')"><span class="letter">${k}</span>${escapeHtml(v)}</button>`}
function choose(k){let q=window.currentQ; let isExam=window.currentIsExam; let sel=isExam?(state.exam.answers[q.id]||[]):(state.answered[q.id]?.selected||[]); if(q.section==='多选题'){sel=sel.includes(k)?sel.filter(x=>x!==k):sel.concat(k).sort()} else sel=[k]; if(isExam) state.exam.answers[q.id]=sel; else state.answered[q.id]={selected:sel,correct:null}; save(); render()}
function submitQ(){let q=window.currentQ; let isExam=window.currentIsExam; let sel=isExam?(state.exam.answers[q.id]||[]):(state.answered[q.id]?.selected||[]); if(!sel.length){alert('先选一个答案呀～');return} let ok=sel.join('')===q.answer; if(!isExam){state.answered[q.id]={selected:sel,correct:ok}; if(!ok)state.wrong[q.id]=true; else delete state.wrong[q.id];} save(); if(isExam) nextQ(); else render();}
function showAnswer(id){let q=QUESTIONS.find(x=>x.id===id); if(!state.answered[id])state.answered[id]={selected:[],correct:false}; state.wrong[id]=true; save(); render()}
function nextQ(){if(state.page==='exam'&&state.exam){if(state.exam.index>=state.exam.ids.length-1){state.exam.done=true}else state.exam.index++;} else state.index++; save(); render()}
function prevQ(){if(state.page==='exam'&&state.exam)state.exam.index=Math.max(0,state.exam.index-1); else state.index=Math.max(0,state.index-1); save(); render()}
function toggleFav(id){state.fav[id]?delete state.fav[id]:state.fav[id]=true;save();render()}
function examResult(arr){let right=0; arr.forEach(q=>{let sel=state.exam.answers[q.id]||[]; if(sel.join('')===q.answer)right++}); view.innerHTML=`<div class="card"><div class="muted">模拟考试成绩</div><div class="big">${right} / ${arr.length}</div><div class="statbar" style="margin-top:12px"><i style="width:${right/arr.length*100}%"></i></div></div><div class="grid"><button class="btn" onclick="startExam()">再考一次</button><button class="btn secondary" onclick="saveExamWrong()">保存错题</button></div><div class="card"><h3>本次错题</h3>${arr.filter(q=>(state.exam.answers[q.id]||[]).join('')!==q.answer).map(q=>`<div class="listitem">第${q.id}题：${escapeHtml(q.stem)}<br><span class="muted">正确答案：${q.answer}</span></div>`).join('')||'<p class="notice">全对！太猛了！</p>'}</div>`}
function saveExamWrong(){state.exam.ids.forEach(id=>{let q=QUESTIONS.find(x=>x.id===id);let sel=state.exam.answers[id]||[];if(sel.join('')!==q.answer)state.wrong[id]=true;});save();alert('已保存到错题本')}
function resetAll(){if(confirm('确定清空所有进度、错题和收藏吗？')){localStorage.removeItem(KEY);location.reload()}}
function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(x=>x[1])}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function render(){renderTabs();syncNav(); if(state.page==='home')home(); if(state.page==='practice')practice(); if(state.page==='wrong')wrong(); if(state.page==='fav')fav(); if(state.page==='exam')examPage();}
render();
</script>
</body></html>
